name: filbet
version: 2.2.8+5
publish_to: none
description: A new Flutter project.
environment:
  sdk: '>=3.1.0 <4.0.0'
dependencies:
  cupertino_icons: ^1.0.8
  get: 4.7.2
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  tuple: ^2.0.2
  intl: ^0.20.2 # Use the pinned version from flutter_localizations
  package_info_plus: ^8.3.1
  device_info_plus: ^10.1.2
  dio: ^5.3.3
  easy_refresh: ^3.3.2
  permission_handler: ^11.3.0
  pretty_dio_logger: ^1.3.1
  cached_network_image: ^3.2.3
  flutter_screenutil: ^5.5.3+2
  connectivity_plus: ^6.1.5
  extended_image: ^8.0.2
  android_id: ^0.4.0
  common_utils: ^2.1.0
  android_intent_plus: ^5.2.2
  flutter_svg: ^2.0.17
  provider: ^6.1.2
  carousel_slider: ^5.0.0
  smooth_page_indicator: ^1.2.0+3
  webview_flutter: 4.10.0
  webview_flutter_android: ^4.0.0
  #本地持久化
  shared_preferences: 2.2.2
  badges: ^3.1.2
  cbor: ^6.3.2
  flutter_smart_dialog: ^4.9.3+2
  #加载html
  flutter_html: ^3.0.0
  #url加载
  url_launcher: ^6.3.2
  flutter_sticky_header: ^0.8.0 #悬停
  qr_flutter: ^4.1.0
  marquee: ^2.2.3
  base32: ^2.1.3
  ota_update: ^6.0.0
  path_provider: ^2.1.5
  flutter_launcher_icons: ^0.14.4
  file_picker: ^8.0.0
  flutter_spinkit: ^5.2.0
  #banner
  card_swiper: ^3.0.1
  telegram_login_flutter: ^1.0.1
  country_picker: ^2.0.27
  dankex_flutter_plugin: ^1.0.7
  mqtt_client: ^9.6.1
  pinput: ^5.0.2
  image_picker: ^1.2.1
  city_pickers: ^1.1.0
  flutter_image_compress: ^2.4.0
  es_compression: ^2.0.15
  convex_bottom_bar: ^3.2.0
  sharetrace_flutter_plugin: ^3.4.0
  mobcommonlib: ^1.1.7
  mobpush_plugin: ^1.3.2
  xinstall_flutter_plugin: ^1.7.6
  charset: ^2.0.1
  characters: ^1.3.0
  apptrace_flutter_plugin: ^1.1.8
  brotli: ^0.6.0
  flutter_ty_app:
    path: ./flutter_ty_app

# connectivity_plus 6.1.x 允许 platform_interface ^2.0.1，会锁到 2.0.1，缺少 ConnectivityResult.satellite
dependency_overrides:
  connectivity_plus_platform_interface: ^2.1.0
  # iOS: avoid NSNull → AuthenticationChallengeResponse cast crash on auth challenges
  webview_flutter_wkwebview: ^3.24.3

dev_dependencies:
  flutter_lints: ^5.0.0
  # flutter_assets_generator: ^0.1.0
  flutter_test:
    sdk: flutter
flutter_icons:
  android: true
  ios: true
  image_path: assets/launcher/sk_icon.png # 将被脚本替换
flutter_native_splash:
  image: assets/splash/dev_splash.png # 将被脚本替换
  color: "#ffffff"
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/images/home/
    - assets/images/activity/
    - assets/images/login/
    - assets/images/language/
    - assets/images/mine/
    - assets/images/mine/record/
    - assets/images/mine/help/
    - assets/images/mine/help/bet/
    - assets/images/currency/
    - assets/images/popup/
    - assets/images/security/
    - assets/images/new/activity/
    - assets/images/new/mine/
    - assets/images/new/home/
    - assets/images/new/seting/
    - assets/images/new/login/
    - assets/images/new/mine/header/
    - assets/images/new/empty/
    - assets/images/new/currency/
    - assets/images/tutorial/
    - assets/html/
    - env/dev.json
    - env/prod.json
    - env/uat.json
    - env/fat.json
  fonts:
    - family: DIN-Bold
      fonts:
        - asset: assets/fonts/DIN-Bold.ttf
    - family: DIN-Medium
      fonts:
        - asset: assets/fonts/DIN-Medium.ttf
    - family: DIN
      fonts:
        - asset: assets/fonts/DIN-Regular.ttf
    - family: Akrobat
      fonts:
        - asset: assets/fonts/Akrobat-Bold.ttf
   