name: iOS Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest
    
    strategy:
      matrix:
        build-type: [device, simulator]
        environment: [dev, prod]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.27.3'
        channel: 'stable'
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.4'
    
    - name: Install dependencies
      run: |
        flutter pub get
        cd ios && pod install
    
    - name: Smart iOS Build
      run: |
        chmod +x scripts/smart_build_ios.sh
        ./scripts/smart_build_ios.sh ${{ matrix.environment }} ${{ matrix.build-type }}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ios-build-${{ matrix.build-type }}-${{ matrix.environment }}
        path: |
          build/ios/ipa/*.ipa
          build/ios/iphonesimulator/Runner.app
        if-no-files-found: ignore


