<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project_title_place_holder</title>

    <link
      href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/quasar@2.17.1/dist/quasar.prod.css"
      rel="stylesheet"
      type="text/css"
    />

    <style></style>
  </head>
  <body>
    <div id="q-app">
      <q-layout view="hHh LpR fFf" class="shadow-2 rounded-borders">
        <q-header
          elevated
          :class="$q.dark.isActive ? 'bg-secondary' : 'bg-black'"
        >
          <q-toolbar>
            <q-btn flat @click="drawer = !drawer" round dense icon="menu" />
            <q-toolbar-title>project_title_place_holder</q-toolbar-title>
          </q-toolbar>
        </q-header>

        <q-drawer
          v-model="drawer"
          :width="300"
          :breakpoint="500"
          show-if-above
          bordered
          :class="$q.dark.isActive ? 'bg-grey-9' : 'bg-grey-3'"
        >
          <q-scroll-area class="fit">
            <q-list>
              <template v-for="(children_lv1, menu_key_lv1) in menu_tree">
                <q-item
                  clickable
                  :active="menu_key === 'Outbox'"
                  v-ripple
                  :key="menu_key_lv1"
                  v-if="children_lv1==1"
                  @click="handle_menu_click([menu_key_lv1])"
                >
                  <q-item-section> {{menu_key_lv1 }} </q-item-section>
                </q-item>

                <q-expansion-item expand-separator v-else :label="menu_key_lv1">
                  <q-card v-if="children_lv1!=1">
                    <q-card-section>
                      <q-list>
                        <template
                          v-for="(children_lv2, menu_key_lv2) in children_lv1"
                          :key="menu_key_lv2"
                        >
                          <q-item
                            clickable
                            :active="menu_key === 'Outbox'"
                            v-ripple
                            :key="menu_key_lv2"
                            v-if="children_lv2==1"
                            @click="handle_menu_click([menu_key_lv1,menu_key_lv2])"
                          >
                            <q-item-section> {{menu_key_lv2 }} </q-item-section>
                          </q-item>

                          <!-- 三级菜单 -->
                          <q-expansion-item
                            expand-separator
                            v-else
                            :key="menu_key_lv2"
                            :label="menu_key_lv2"
                          >
                            <q-card>
                              <q-card-section>
                                <q-list>
                                  <template
                                    v-for="(children_lv3, menu_key_lv3) in children_lv2"
                                    :key="menu_key_lv3"
                                  >
                                    <q-item
                                      clickable
                                      :active="menu_key === 'Outbox'"
                                      v-ripple
                                      :key="menu_key_lv3"
                                      v-if="children_lv3==1"
                                         @click="handle_menu_click([menu_key_lv1,menu_key_lv2,menu_key_lv3])"
                                    
                                    >
                                      <q-item-section>
                                        {{menu_key_lv3 }}
                                      </q-item-section>
                                    </q-item>
                                  </template>
                                </q-list>
                              </q-card-section>
                            </q-card>
                          </q-expansion-item>

                          <q-separator :key="'sep' + menu_key_lv2" />
                        </template>
                      </q-list>
                    </q-card-section>
                  </q-card>
                </q-expansion-item>
              </template>
            </q-list>
          </q-scroll-area>
        </q-drawer>

        <q-page-container>
          <q-page padding fit>
            <iframe
              v-if="iframe_src"
              id="myIframe"
              :src="iframe_src"
              style="width: 100%; height: 90vh; border: none"
            >
            </iframe>
          </q-page>
        </q-page-container>
      </q-layout>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/quasar@2.17.1/dist/quasar.umd.prod.js"></script>
    <script src=" https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js "></script>
    <script>
      // const all_menus = [
      //   "H5列表/虚拟滚/H5列表虚拟滚动组件逻辑组合",
      //   "无菜单配置/单关单关合并串关切换逻辑",
      //   "无菜单配置/投注逻辑整理",
      //   "自动化生成文档工具/自动化生成文档工具",
      // ];
      const all_menus =  all_menus_place_holder  ;
      const app = Vue.createApp({
        data() {
          return {
            drawer: true,
            iframe_src: "",
            menu_list: [],
            menu_tree: [],
          };
        },
        created() {
          console.log("_-------", _);
          console.log("_-------", _.set);
          this.compute_menu_list();
          this.handle_menu_click([all_menus[0]]);
        },
        methods: {
          // 递归分割菜单
          build_menu_tree(menu_str, menu_tree, lv = 0) {
            let menu_arr = menu_str.split("/");
            menu_arr.map((x, index) => {});
          },

          // 整理菜单
          compute_menu_list() {
            let menu_tree = {};
            all_menus.map((x) => {
              console.log('x.replaceAll("/", -------', x.replaceAll("/", "."));

              let arr= x.split("/");
              let path_ ='';
              for (let i = 0; i < arr.length; i++) {
                path_ += `[${arr[i]}]`  ;
             
              }


              _.set(menu_tree, path_, 1);
            });
            console.log("menu_tree-------", menu_tree);
            this.menu_tree = menu_tree;
          },

          handle_menu_click(arr) {
            this.iframe_src = "/pages/" + arr.join("/") + ".html";
          },
        },
      });

      app.use(Quasar);
      app.mount("#q-app");
    </script>
  </body>
</html>
