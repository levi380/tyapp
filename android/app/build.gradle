// 读取 JSON 文件并返回解析后的 Map
def loadAppConfig() {
    // println "【Build Info】env = ${project.hasProperty("env")} ${project.getProperty("env")}"
    def env = project.hasProperty("env") ? project.getProperty("env") : "dev"
    def projectRootDir = rootProject.projectDir.parentFile
    def configFile = new File(projectRootDir, "env/${env}.json")
    def config = new groovy.json.JsonSlurper().parseText(configFile.text)

    return config
}

// 获取配置（避免重复解析）
def appConfig = loadAppConfig().appConfig
def envConfig = loadAppConfig().envConfig

android {
    namespace = "com.filbet.project.filbet"
    compileSdk = 36

    println "【Build Info】构建  图片地址${envConfig.imgBaseUrl}: 版本号：${appConfig.version} 版本code：${appConfig.versionCode.toInteger()}"

    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = appConfig.packageName
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = appConfig.versionCode.toInteger()
        versionName = appConfig.version

        manifestPlaceholders = [
                appName: appConfig.appName,
                XINSTALL_APPKEY : "7pm0m7he",
        ]

        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
    }

    signingConfigs {
        release {
            keyAlias 'sk123'
            keyPassword 'sk123456'
            storeFile file('sk')
            storePassword 'sk123456'
            v1SigningEnabled true
            v2SigningEnabled true
        }
    }

    buildTypes {
        release {
            // 启用代码混淆和资源压缩
            minifyEnabled = true
            shrinkResources = true
            zipAlignEnabled = true

            signingConfig = signingConfigs.release

            // ProGuard规则文件
            proguardFiles(
                    getDefaultProguardFile('proguard-android-optimize.txt'),
                    'proguard-rules.pro'
            )
        }
        debug {
            signingConfig signingConfigs.release
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging true
        }
    }

    applicationVariants.all { variant ->
        // 获取构建类型（release/debug）
        def buildTypeName = variant.buildType.name
        // 获取产品风味（prod/dev/test）
        def flavorName = variant.flavorName

        variant.outputs.all { output ->
            // 版本号
            def versionName = variant.versionName

            def env = project.hasProperty("env") ? project.getProperty("env") : "dev"
            // 判断是否是 prod
            if (env == "prod") {
                outputFileName = "sk_v${versionName}.apk"
            } else {
                // 生成时间戳
                def date = new Date().format("MMddHHmm")
                // 根据构建类型生成名字
                def apkName = "sk_${env}_${date}.apk"
                outputFileName = apkName
            }
        }
    }
}

